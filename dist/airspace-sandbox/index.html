<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>低空航线形态沙盘</title>
<style>
  :root{
    --bg:#ffffff;
    --paper:rgba(255,255,255,.86);
    --ink:#17191c;
    --muted:#6d747c;
    --line:#d9dee4;
    --soft:#eef1f4;
    --accent:#1677ff;
    --danger:#d94841;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}
  #stage{position:fixed;inset:0;background:#ffffff}
  #stage canvas{display:block}
  .panel{position:absolute;z-index:5;background:var(--paper);border:1px solid var(--line);
    box-shadow:0 12px 34px rgba(25,30,35,.10);backdrop-filter:blur(12px);border-radius:8px}
  #controlPanel{left:18px;top:18px;width:456px;max-height:calc(100vh - 36px);overflow:auto;padding:18px}
  h1{font-size:18px;line-height:1.25;margin:0;font-weight:700;letter-spacing:0}
  .sub{font-size:12px;color:var(--muted);line-height:1.45;margin:5px 0 0}
  .sec{margin-top:16px;padding-top:14px;border-top:1px solid var(--soft)}
  .sec:first-of-type{margin-top:14px}
  .lbl{display:block;font-size:11px;letter-spacing:.55px;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin-bottom:8px}
  select{width:100%;height:36px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);
    padding:0 10px;font-size:13px;outline:none}
  select:focus{border-color:#242a31}
  .presets{display:block}
  button{appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:7px;
    min-height:36px;padding:8px 10px;font-size:13px;cursor:pointer}
  button:hover{border-color:#aab4c1;background:#fafafa}
  button.active{border-color:#222;background:#222;color:#fff}
  .btnrow{display:flex;gap:6px}
  .btnrow button{flex:1}
  button.danger:hover{border-color:var(--danger);color:var(--danger)}
  .controlGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .slider{margin:0 0 10px}
  .span2{grid-column:1/-1}
  .row{display:flex;justify-content:space-between;gap:8px;align-items:baseline;margin-bottom:6px}
  .k{font-size:13px}.v{font-size:13px;color:#0c63d4;font-weight:700;font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;height:5px;border-radius:999px;background:#dfe4ea;outline:none;-webkit-appearance:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:#fff;border:2px solid #20242a;box-shadow:0 1px 4px rgba(0,0,0,.18)}
  input[type=color]{width:100%;height:28px;border:1px solid var(--line);border-radius:7px;background:#fff;padding:3px;cursor:pointer}
  input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  input[type=color]::-webkit-color-swatch{border:0;border-radius:5px}
  .metric{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:baseline;padding:7px 0;border-top:1px solid var(--soft)}
  .metric:first-of-type{border-top:0}
  .metric span:first-child{font-size:11px;color:var(--muted)}
  .metric span:last-child{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
  .alt{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:12px;color:var(--muted)}
  .sw{width:30px;height:6px;border-radius:5px;display:inline-block;flex:none}
  .switchGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .switchRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 9px;border:1px solid var(--soft);border-radius:7px;background:#fff}
  .switchRow span:first-child{font-size:13px;font-weight:650}
  .switchRow input{position:absolute;opacity:0;pointer-events:none}
  .subsec{margin-top:12px}
  .subsec:first-child{margin-top:0}
  .subhead{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.35px;margin:0 0 8px}
  .layerList{display:grid;gap:6px}
  .layerRow{display:grid;grid-template-columns:14px 1fr auto;align-items:center;gap:8px;padding:8px 9px;
    border:1px solid var(--soft);border-radius:7px;background:#fff}
  .layerRow input{position:absolute;opacity:0;pointer-events:none}
  .layerMark{width:10px;height:10px;border-radius:50%;background:#9aa4af;box-shadow:inset 0 0 0 1px rgba(0,0,0,.10)}
  .layerMark.route{background:#1677ff}.layerMark.burden{background:#d75f4b}.layerMark.terrain{background:#7d8791}
  .layerMark.building{background:#d8d8d4}.layerMark.shadow{background:#2d333a}.layerMark.halo{background:#b8c1cb}
  .layerMark.guide{background:#4f9cf5}.layerMark.volume{background:#9fd3ff}
  .layerText{font-size:13px;font-weight:650}
  .tabBar{display:flex;gap:3px;margin-top:14px;border-bottom:1px solid var(--line);padding-left:2px}
  .tabBtn{min-height:31px;border:1px solid var(--line);border-bottom:0;border-radius:7px 7px 0 0;background:#f7f8fa;
    padding:0 11px;font-size:12px;font-weight:750;color:var(--muted);cursor:pointer;position:relative;top:1px}
  .tabBtn.active{background:#fff;color:#17191c;border-color:var(--line);box-shadow:0 -1px 0 #fff inset}
  .tabPanel{display:none}
  .tabPanel.active{display:block}
  .toggle{width:42px;height:24px;border-radius:999px;background:#dfe4ea;position:relative;flex:none;transition:.16s}
  .toggle:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:.16s}
  .switchRow input:checked + .toggle,.layerRow input:checked + .toggle{background:#242a31}
  .switchRow input:checked + .toggle:before,.layerRow input:checked + .toggle:before{transform:translateX(18px)}
  .radioGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .radioChip{border:1px solid var(--soft);background:#fff;border-radius:7px;min-height:34px;padding:7px 9px;
    display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer}
  .radioChip input{accent-color:#242a31}
  .radioChip:has(input:checked){border-color:#242a31;background:#f4f5f6;font-weight:700}
  .kernelSketch{position:relative;height:150px;margin:6px 0 10px;border:1px solid var(--soft);border-radius:8px;
    background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);overflow:hidden}
  .kernelSketch svg{position:absolute;inset:0;width:100%;height:100%}
  .kernelSketch .droneIcon{position:absolute;left:50%;top:21px;width:42px;height:42px;transform:translateX(-50%);
    opacity:.92}
  .kernelSketch .personIcon{position:absolute;left:58px;top:85px;width:30px;height:30px;opacity:0;transition:opacity .16s}
  .kernelSketch .range{opacity:0;stroke:none;vector-effect:non-scaling-stroke;clip-path:circle(0 at 50% 34%)}
  .range.noise{fill:#4867c6}
  .range.risk{fill:#d94841}
  .range.privacy{fill:#557fd3}
  .range.visual{fill:#e08f2f;clip-path:circle(0 at 17.5% 68%)}
  .kernelSketch[data-channel="noise"] .range.noise{animation:projectFromDrone .55s ease-out forwards;opacity:.28}
  .kernelSketch[data-channel="risk"] .range.risk{animation:projectFromDrone .55s ease-out forwards;opacity:.24}
  .kernelSketch[data-channel="privacy"] .range.privacy{animation:projectFromDrone .55s ease-out forwards;opacity:.22}
  .kernelSketch[data-channel="visual"] .range.visual{animation:projectFromPerson .55s ease-out forwards;opacity:.28}
  .kernelSketch[data-channel="visual"] .personIcon{opacity:.78}
  .sketchGround{stroke:#c8cfd8;stroke-width:1.2}
  @keyframes projectFromDrone{from{clip-path:circle(0 at 50% 34%)}to{clip-path:circle(95% at 50% 34%)}}
  @keyframes projectFromPerson{from{clip-path:circle(0 at 17.5% 68%)}to{clip-path:circle(100% at 17.5% 68%)}}
  #mapsGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .mapTile{min-width:0}
  .mapTile canvas{width:132px;height:132px;display:block;background:#fff;border:1px solid var(--line);border-radius:7px}
  .mapCap{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px;font-size:11px;color:var(--muted)}
  .mapCap b{font-size:12px;color:var(--ink);font-weight:700}
  #busy{position:absolute;z-index:6;top:16px;left:50%;transform:translateX(-50%);
    opacity:0;transition:.16s;background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:5px 12px;font-size:11px;color:var(--muted);box-shadow:0 8px 22px rgba(25,30,35,.08)}
  #busy.on{opacity:1}
</style>
</head>
<body>
<div id="stage">
  <div id="busy">计算多高度航线...</div>

  <div id="controlPanel" class="panel">
    <h1>低空空域形态与外部性沙盘</h1>
    <p class="sub">边界探针生成多高度航线，同一流量场切换不同外部性内核。</p>

    <div class="sec">
      <label class="lbl">预设地块</label>
      <select class="presets" id="presets"></select>
    </div>

    <div class="tabBar" id="tabBar">
      <button class="tabBtn" data-tab="compute" type="button">计算与外部性</button>
      <button class="tabBtn active" data-tab="view" type="button">视图与图层</button>
      <button class="tabBtn" data-tab="maps" type="button">可飞图与高度</button>
    </div>

    <div class="sec tabPanel" data-panel="compute">
      <label class="lbl">计算参数</label>
      <div class="controlGrid">
        <div class="slider span2">
          <div class="row"><span class="k">入口密度</span><span class="v"><span id="densityV">6</span> /边</span></div>
          <input type="range" id="density" min="2" max="20" step="1" value="6">
        </div>
        <div class="slider">
          <div class="row"><span class="k">高度间隔</span><span class="v">10 m</span></div>
        </div>
        <div class="slider">
          <div class="row"><span class="k">航线透明度</span><span class="v"><span id="opacityV">100</span>%</span></div>
          <input type="range" id="routeOpacity" min="20" max="400" step="10" value="100">
        </div>
      </div>
    </div>

    <div class="sec tabPanel active" data-panel="view">
      <label class="lbl">视角与光照</label>
      <div class="controlGrid">
        <div class="slider">
          <div class="row"><span class="k">水平角</span><span class="v"><span id="azimuthV">-46</span>°</span></div>
          <input type="range" id="cameraAzimuth" min="-180" max="180" step="1" value="-46">
        </div>
        <div class="slider">
          <div class="row"><span class="k">俯仰角</span><span class="v"><span id="pitchV">35</span>°</span></div>
          <input type="range" id="cameraPitch" min="0" max="80" step="1" value="35">
        </div>
        <div class="slider">
          <div class="row"><span class="k">建筑颜色</span><span class="v" id="buildingColorV">#c2c2c2</span></div>
          <input type="color" id="buildingColor" value="#c2c2c2">
        </div>
        <div class="slider">
          <div class="row"><span class="k">光线朝向</span><span class="v"><span id="sunAzimuthV">350</span>°</span></div>
          <input type="range" id="sunAzimuth" min="0" max="360" step="1" value="350">
        </div>
        <div class="slider">
          <div class="row"><span class="k">光线俯仰</span><span class="v"><span id="sunPitchV">75</span>°</span></div>
          <input type="range" id="sunPitch" min="12" max="78" step="1" value="75">
        </div>
        <div class="slider">
          <div class="row"><span class="k">阴影柔化</span><span class="v"><span id="shadowBlurV">215</span>%</span></div>
          <input type="range" id="shadowBlur" min="0" max="300" step="5" value="215">
        </div>
      </div>
    </div>

    <div class="sec tabPanel" data-panel="view">
      <label class="lbl">图层</label>
      <div class="layerList">
        <label class="layerRow"><span class="layerMark route"></span><span class="layerText">航线</span><input type="checkbox" id="routeToggle"><span class="toggle"></span></label>
        <label class="layerRow"><span class="layerMark burden"></span><span class="layerText">外部性叠加</span><input type="checkbox" id="noiseToggle" checked><span class="toggle"></span></label>
        <label class="layerRow"><span class="layerMark terrain"></span><span class="layerText">DEM 地形</span><input type="checkbox" id="demToggle"><span class="toggle"></span></label>
        <label class="layerRow"><span class="layerMark building"></span><span class="layerText">建筑</span><input type="checkbox" id="buildingToggle" checked><span class="toggle"></span></label>
        <label class="layerRow"><span class="layerMark shadow"></span><span class="layerText">阴影</span><input type="checkbox" id="shadowToggle" checked><span class="toggle"></span></label>
        <label class="layerRow"><span class="layerMark halo"></span><span class="layerText">辅助建筑</span><input type="checkbox" id="haloToggle"><span class="toggle"></span></label>
        <label class="layerRow"><span class="layerMark guide"></span><span class="layerText">高度边界</span><input type="checkbox" id="heightGuideToggle"><span class="toggle"></span></label>
        <label class="layerRow"><span class="layerMark volume"></span><span class="layerText">可飞体块</span><input type="checkbox" id="flyableVolumeToggle"><span class="toggle"></span></label>
        <label class="layerRow"><span class="layerMark terrain"></span><span class="layerText">高度尺</span><input type="checkbox" id="heightScaleToggle" checked><span class="toggle"></span></label>
      </div>
    </div>

    <div class="sec tabPanel" data-panel="compute">
      <label class="lbl">外部性通道</label>
      <div class="row"><span class="k">当前内核</span><span class="v" id="channelV">噪声</span></div>
      <div class="kernelSketch" id="kernelSketch" data-channel="noise" aria-label="外部性影响范围示意">
        <svg viewBox="0 0 420 150" aria-hidden="true">
          <line class="sketchGround" x1="26" y1="104" x2="394" y2="104"/>
          <circle class="range noise" cx="210" cy="50" r="72"/>
          <g class="range risk">
            <path d="M210 50 L124 106 Q210 133 296 106 Z"/>
            <ellipse cx="210" cy="106" rx="86" ry="19"/>
          </g>
          <path class="range privacy" d="M128 50 C128 95 165 132 210 132 C255 132 292 95 292 50 Z"/>
          <path class="range visual" d="M72 104 L210 42 Q241 58 224 86 Z"/>
        </svg>
        <img class="droneIcon" src="assets/drone.svg" alt="">
        <img class="personIcon" src="assets/person.svg" alt="">
      </div>
      <div class="radioGrid" id="channelRadios">
        <label class="radioChip"><input type="radio" name="externalityChannel" value="noise" checked>噪声</label>
        <label class="radioChip"><input type="radio" name="externalityChannel" value="risk">坠落风险</label>
        <label class="radioChip"><input type="radio" name="externalityChannel" value="privacy">隐私</label>
        <label class="radioChip"><input type="radio" name="externalityChannel" value="visual">视觉烦扰</label>
      </div>
    </div>

    <div class="sec tabPanel" data-panel="maps">
      <label class="lbl">可飞地图</label>
      <div id="mapsGrid"></div>
      <p class="sub">浅色=可飞，深色=障碍/地形，蓝线=该高度最短航线。</p>
    </div>

    <div class="sec tabPanel" data-panel="maps">
      <label class="lbl">巡航高度</label>
      <div id="altLegend"></div>
    </div>
  </div>
</div>

<script src="vendor/three.min.js"></script>
<script src="vendor/OrbitControls.js"></script>
<script src="vendor/clipper.js"></script>
<script src="data/city-blocks.js"></script>
<script src="app.js"></script>
</body>
</html>
